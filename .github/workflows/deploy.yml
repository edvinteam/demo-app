name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Massive-Hosting/deploy-action@v1
        with:
          ssh-key: ${{ secrets.HOSTING_SSH_KEY }}
          host: ${{ vars.HOSTING_SSH_HOST }}
          webapp: ${{ vars.WEBAPP_ID }}
          build: composer install --no-dev --optimize-autoloader
          exclude: .git .github node_modules tests
          run-after: |
            cd ~/apps/${{ vars.WEBAPP_ID }}
            php artisan migrate --force
            php artisan storage:link 2>/dev/null || true
            php artisan config:cache
            php artisan route:cache
            php artisan scout:import "App\Models\Task" 2>/dev/null || true
